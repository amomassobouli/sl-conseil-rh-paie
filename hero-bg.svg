<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f33;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2e4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#243b5e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#heroBg)"/>
  
  <!-- Decorative circles with glow -->
  <circle cx="1000" cy="100" r="200" fill="#d4a843" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1100" cy="150" r="150" fill="#e8c46a" opacity="0.06" filter="url(#glow)"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Accent lines -->
  <line x1="0" y1="0" x2="200" y2="0" stroke="#d4a843" stroke-width="2" opacity="0.3"/>
  <line x1="1200" y1="800" x2="1000" y2="800" stroke="#e8c46a" stroke-width="2" opacity="0.3"/>
</svg>